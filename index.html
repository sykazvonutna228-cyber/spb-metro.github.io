    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background-color: #05070f;
        }

        /* ---------------------------------------------------- */
        /* PRELOADER                                            */
        /* ---------------------------------------------------- */
        #preloader {
            position: fixed;
            inset: 0;
            background-color: #05070f;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
        }
        
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ---------------------------------------------------- */
        /* MAP & MARKERS                                        */
        /* ---------------------------------------------------- */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #05070f;
        }

        /* Скрываем нативные элементы Leaflet */
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }

        /* Кастомные GPU-ускоренные маркеры */
        .premium-marker {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #05070f;
            border: 2px solid var(--station-color);
            box-shadow: 0 0 8px var(--station-color), inset 0 0 2px rgba(255,255,255,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s ease, box-shadow 0.3s ease;
            will-change: transform, background-color;
        }

        /* Узел пересадки */
        .premium-marker.hub {
            border-width: 2.5px;
            box-shadow: 0 0 10px var(--station-color), inset 0 0 4px rgba(255,255,255,0.4);
        }

        /* Наведение и активность */
        .leaflet-marker-icon:hover .premium-marker, .premium-marker.active {
            transform: scale(1.6);
            background-color: var(--station-color);
            box-shadow: 0 0 16px var(--station-color);
            z-index: 1000 !important;
        }

        /* Пульсация для выбранных точек маршрута */
        @keyframes pulse-marker {
            0% { box-shadow: 0 0 0 0 var(--station-color-alpha); }
            70% { box-shadow: 0 0 0 10px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }
        .premium-marker.route-node {
            background-color: var(--station-color);
            transform: scale(1.3);
            animation: pulse-marker 2s infinite;
        }

        /* Стабилизированные подписи */
        .stable-label-container {
            position: absolute;
            left: 0;
            top: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            will-change: opacity;
        }

        .stable-label-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.75);
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-shadow: 0 1px 3px #000, 0 0 2px #000;
            white-space: nowrap;
        }

        .stable-label-important {
            color: #ffffff;
            font-weight: 700;
            font-size: 11.5px;
        }

        /* ---------------------------------------------------- */
        /* UI PANELS                                            */
        /* ---------------------------------------------------- */
        .minimal-dock {
            background: rgba(10, 12, 22, 0.85);
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.8), 0 1px 0 0 rgba(255, 255, 255, 0.05) inset;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .suggestions-dropdown {
            background: rgba(15, 22, 38, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .carousel-item {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, border-color 0.4s ease;
            transform: scale(0.93);
            opacity: 0.45;
        }
        .carousel-item.active {
            transform: scale(1.02);
            opacity: 1;
            border-color: rgba(255, 255, 255, 0.15) !important;
            background: rgba(255, 255, 255, 0.04);
        }

        .dot-connector { position: absolute; height: 2px; background: rgba(255, 255, 255, 0.08); z-index: 0; transition: all 0.4s ease; }
        .dot-connector-active { position: absolute; height: 2px; z-index: 1; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .step-dot { width: 6px; height: 6px; border-radius: 999px; background: #272d3d; z-index: 2; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .step-dot.active { transform: scale(1.4); }

    </style>
</head>
<body class="text-gray-200 select-none">

    <!-- Предзагрузчик -->

    </div>

                </div>

                <button id="btn-reverse" class="p-3 rounded-2xl bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white transition-all active:scale-95">

                <div class="relative flex-1">

                </div>
            </div>

            <!-- 2. РЕЖИМ РЕЗУЛЬТАТА (ЛАКОНИЧНЫЙ ПРЕВЬЮ) -->
            <div id="dock-result" class="hidden flex items-center justify-between w-full">
                <div class="flex items-center gap-3 overflow-hidden flex-1 mr-2">
                    <span id="res-time" class="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1.5 rounded-xl border border-emerald-500/15 shrink-0">~0 мин</span>
                    <div class="text-xs font-semibold text-white/95 truncate flex items-center gap-1.5">
                        <span id="res-start-name" class="truncate">Станция А</span>
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-gray-600 shrink-0"></i>
                        <span id="res-end-name" class="truncate">Станция Б</span>
                    </div>
                </div>

                <div class="flex items-center gap-1.5 shrink-0">
                    <button id="btn-toggle-details" class="flex items-center gap-1 px-3 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-xs text-gray-300 font-semibold transition-all">
                        <span>Детали</span>
                        <i id="details-chevron" data-lucide="chevron-up" class="w-3.5 h-3.5 text-gray-400 transition-transform duration-300"></i>
                    </button>
                    <button id="btn-share" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-blue-400 hover:text-blue-300 transition-all" title="Поделиться">
                        <i data-lucide="share-2" class="w-4 h-4"></i>
                    </button>
                    <button id="btn-close-route" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white transition-all">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- 3. ДИНАМИЧЕСКИЙ РАСКРЫВАЮЩИЙСЯ СЛАЙДЕР ШАГОВ -->
            <div id="dock-details-panel" class="hidden flex-col gap-3.5 border-t border-white/5 pt-3.5 overflow-hidden transition-all duration-300">
                <div class="relative w-full flex items-center">
                    <button id="btn-prev-slide" class="absolute left-0 z-10 w-7 h-7 rounded-full bg-black/40 hover:bg-black/60 border border-white/5 flex items-center justify-center text-gray-400 transition-all">
                        <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
                    </button>

                    <div id="carousel-wrapper" class="w-full overflow-x-auto no-scrollbar snap-x snap-mandatory flex gap-1.5 py-1 px-8 scroll-smooth"></div>

                    <button id="btn-next-slide" class="absolute right-0 z-10 w-7 h-7 rounded-full bg-black/40 hover:bg-black/60 border border-white/5 flex items-center justify-center text-gray-400 transition-all">
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
                    </button>
                </div>

                <div id="dots-line-container" class="flex items-center justify-center relative w-[85%] mx-auto py-1">
                    <div id="dot-base-connector" class="dot-connector"></div>
                    <div id="dot-active-connector" class="dot-connector-active"></div>
                </div>
            </div>

            <div id="dock-status" class="text-[10px] text-gray-500 font-medium px-1 flex justify-between items-center">
                <span id="status-message">Нажмите на две станции на карте для построения маршрута</span>
                <span id="mrid-badge" class="hidden text-[9px] uppercase tracking-wider text-blue-400 font-bold bg-blue-500/10 px-1.5 py-0.5 rounded border border-blue-500/25">MRID</span>
            </div>
        </div>
    </div>

            ['devyatkino', 'grazhdansky', 3, 'line'], ['grazhdansky', 'academicheskaya', 3, 'line'], ['academicheskaya', 'polytekhnicheskaya', 3, 'line'], ['polytekhnicheskaya', 'muzhestva', 2, 'line'], ['muzhestva', 'lesnaya', 3, 'line'], ['lesnaya', 'vyborgskaya', 2, 'line'], ['vyborgskaya', 'lenina', 3, 'line'], ['lenina', 'chernyshevskaya', 3, 'line'], ['chernyshevskaya', 'vosstaniya', 3, 'line'], ['vosstaniya', 'vladimirskaya', 2, 'line'], ['vladimirskaya', 'pushkinskaya', 2, 'line'], ['pushkinskaya', 'tekhnologichesky1', 2, 'line'], ['tekhnologichesky1', 'baltiyskaya', 3, 'line'], ['baltiyskaya', 'narvskaya', 3, 'line'], ['narvskaya', 'kirovsky', 3, 'line'], ['kirovsky', 'avtovo', 2, 'line'], ['avtovo', 'leninsky', 3, 'line'], ['leninsky', 'veteranov', 2, 'line'],
            ['parnas', 'prosvescheniya', 3, 'line'], ['prosvescheniya', 'ozerki', 3, 'line'], ['ozerki', 'udelnaya', 3, 'line'], ['udelnaya', 'pionerskaya', 3, 'line'], ['pionerskaya', 'chornaya_rechka', 3, 'line'], ['chornaya_rechka', 'petrogradskaya', 3, 'line'], ['petrogradskaya', 'gorkovskaya', 2, 'line'], ['gorkovskaya', 'nevsky', 3, 'line'], ['nevsky', 'sennaya', 2, 'line'], ['sennaya', 'tekhnologichesky2', 2, 'line'], ['tekhnologichesky2', 'frunzenskaya', 3, 'line'], ['frunzenskaya', 'moskovskie_vorota', 2, 'line'], ['moskovskie_vorota', 'elektrosila', 2, 'line'], ['elektrosila', 'park_pobedy', 3, 'line'], ['park_pobedy', 'moskovskaya', 3, 'line'], ['moskovskaya', 'zvyozdnaya', 3, 'line'], ['zvyozdnaya', 'kupchino', 3, 'line'],
            ['begovaya', 'novokrestovskaya', 3, 'line'], ['novokrestovskaya', 'primorskaya', 4, 'line'], ['primorskaya', 'vasileostrovskaya', 4, 'line'], ['vasileostrovskaya', 'gostiny', 4, 'line'], ['gostiny', 'mayakovskaya', 3, 'line'], ['mayakovskaya', 'ploschad_nevskogo1', 3, 'line'], ['ploschad_nevskogo1', 'elizarovskaya', 4, 'line'], ['elizarovskaya', 'lomonosovskaya', 3, 'line'], ['lomonosovskaya', 'proletarskaya', 3, 'line'], ['proletarskaya', 'obukhovo', 3, 'line'], ['obukhovo', 'rybatskoye', 3, 'line'],
            ['spasskaya', 'dostoevskaya', 3, 'line'], ['dostoevskaya', 'ligovsky', 2, 'line'], ['ligovsky', 'ploschad_nevskogo2', 3, 'line'], ['ploschad_nevskogo2', 'novocherkasskaya', 3, 'line'], ['novocherkasskaya', 'ladoshskaya', 3, 'line'], ['ladoshskaya', 'bolshevikov', 3, 'line'], ['bolshevikov', 'dybenko', 3, 'line'],
            ['komendantsky', 'staraya_derevnya', 3, 'line'], ['staraya_derevnya', 'krestovsky', 3, 'line'], ['krestovsky', 'chkalovskaya', 3, 'line'], ['chkalovskaya', 'sportivnaya', 3, 'line'], ['sportivnaya', 'admiralteyskaya', 3, 'line'], ['admiralteyskaya', 'sadovaya', 3, 'line'], ['sadovaya', 'zvenigorodskaya', 3, 'line'], ['zvenigorodskaya', 'obvodny', 3, 'line'], ['obvodny', 'volkovskaya', 3, 'line'], ['volkovskaya', 'bukharestskaya', 3, 'line'], ['bukharestskaya', 'mezhdunarodnaya', 2, 'line'], ['mezhdunarodnaya', 'slavy', 3, 'line'], ['slavy', 'dunayskaya', 3, 'line'], ['dunayskaya', 'shushary', 3, 'line'],
            ['vosstaniya', 'mayakovskaya', 4, 'transfer'], ['vladimirskaya', 'dostoevskaya', 4, 'transfer'], ['sennaya', 'spasskaya', 4, 'transfer'], ['sennaya', 'sadovaya', 4, 'transfer'], ['spasskaya', 'sadovaya', 4, 'transfer'], ['pushkinskaya', 'zvenigorodskaya', 4, 'transfer'], ['nevsky', 'gostiny', 4, 'transfer'], ['ploschad_nevskogo1', 'ploschad_nevskogo2', 4, 'transfer'], ['tekhnologichesky1', 'tekhnologichesky2', 2, 'transfer']
        ];

        const graph = {};
        Object.keys(stations).forEach(key => graph[key] = []);
        rawEdges.forEach(edge => {
            const [u, v, weight, type] = edge;
            if (graph[u] && graph[v]) {
                graph[u].push({ node: v, weight, type });
                graph[v].push({ node: u, weight, type });
            }
        });

        // --------------------------------------------------------
        // 2. ИНИЦИАЛИЗАЦИЯ И ПРЕДЗАГРУЗКА КАРТЫ
        // --------------------------------------------------------
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            maxBounds: [[59.7, 29.9], [60.2, 30.6]],
            minZoom: 10,
            zoomSnap: 0.5,        
            zoomDelta: 0.5,
            wheelPxPerZoomLevel: 100
        }).setView([59.9325, 30.3340], 11.5);

        const tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 18,
            minZoom: 10,
            keepBuffer: 6,         
            updateWhenIdle: true   
        }).addTo(map);

        const baseLayerGroup = L.layerGroup().addTo(map);
        const labelsLayerGroup = L.layerGroup().addTo(map);
        const routeLayerGroup = L.layerGroup().addTo(map);

        let selectedStartId = null;
        let selectedEndId = null;
        let stationMarkers = {};

        // Логика предзагрузчика
        let tilesLoaded = false;
        tileLayer.on('load', () => { tilesLoaded = true; checkPreloader(); });
        window.addEventListener('load', () => { setTimeout(checkPreloader, 500); }); 

        function checkPreloader() {
            if (tilesLoaded) {
                const preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.visibility = 'hidden', 600);
            }
        }

        // --------------------------------------------------------
        // 3. ОТРИСОВКА ИНФРАСТРУКТУРЫ (GPU-МАРКЕРЫ И СТАБИЛЬНЫЕ ПОДПИСИ)
        // --------------------------------------------------------
        function renderMetroMap() {
            baseLayerGroup.clearLayers();
            labelsLayerGroup.clearLayers();
            stationMarkers = {};

            // Отрисовка линий
            rawEdges.forEach(edge => {
                const [u, v, , type] = edge;
                const nodeU = stations[u];
                const nodeV = stations[v];
                
                if (type === 'line') {
                    const color = linesInfo[nodeU.line].color;
                    L.polyline([nodeU.coords, nodeV.coords], { color: color, weight: 6, opacity: 0.15, lineCap: 'round' }).addTo(baseLayerGroup);
                    L.polyline([nodeU.coords, nodeV.coords], { color: color, weight: 2.5, opacity: 0.8, lineCap: 'round' }).addTo(baseLayerGroup);
                } else if (type === 'transfer') {
                    L.polyline([nodeU.coords, nodeV.coords], { color: '#6b7280', weight: 1.5, opacity: 0.5, dashArray: '3, 4' }).addTo(baseLayerGroup);
                }
            });

            // Отрисовка Маркеров и Подписей
            Object.entries(stations).forEach(([id, st]) => {
                const color = linesInfo[st.line].color;
                
                const markerSize = st.isHub ? 12 : 8;
                const customIcon = L.divIcon({
                    className: '', 
                    html: `<div class="premium-marker ${st.isHub ? 'hub' : ''}" style="--station-color: ${color}; --station-color-alpha: ${color}66;"></div>`,
                    iconSize: [markerSize, markerSize],
                    iconAnchor: [markerSize / 2, markerSize / 2]
                });

                const marker = L.marker(st.coords, { icon: customIcon }).addTo(baseLayerGroup);
                
                marker.on('click', () => selectStation(id));
                stationMarkers[id] = marker;

                // Стабильные подписи
                let xOffset = 10;
                let yOffset = -5;
                if (id === 'sennaya') { xOffset = -80; yOffset = 15; }
                if (id === 'spasskaya') { xOffset = -85; yOffset = -10; }
                if (id === 'sadovaya') { xOffset = -75; yOffset = 3; }
                if (id === 'nevsky') { xOffset = -100; yOffset = -5; }
                if (id === 'vladimirskaya' || id === 'pushkinskaya') { xOffset = -85; yOffset = -5; }
                if (id === 'tekhnologichesky1' || id === 'tekhnologichesky2') { xOffset = 12; yOffset = -8; }

                const labelIcon = L.divIcon({
                    className: 'stable-label-container',
                    html: `<div class="stable-label-text ${st.isHub ? 'stable-label-important' : ''}" style="transform: translate(${xOffset}px, ${yOffset}px);" id="lbl-${id}">${st.name}</div>`,
                    iconSize: [0, 0],
                    iconAnchor: [0, 0]
                });

                L.marker(st.coords, { icon: labelIcon, interactive: false }).addTo(labelsLayerGroup);
            });

            optimizeLabels();
        }

        // Управление видимостью подписей
        function optimizeLabels() {
            const zoom = map.getZoom();
            Object.entries(stations).forEach(([id, st]) => {
                const el = document.getElementById(`lbl-${id}`);
                if (el) {
                    const container = el.parentElement;
                    if (st.isHub) {
                        container.style.opacity = zoom >= 10.5 ? '1' : '0';
                    } else {
                        container.style.opacity = zoom >= 12.5 ? '1' : '0';
                    }
                }
            });
        }

        map.on('zoomend', optimizeLabels);
        renderMetroMap();

        // --------------------------------------------------------
        // 4. ЛОГИКА ИНТЕРФЕЙСА (АВТОЗАПОЛНЕНИЕ С ИКОНКАМИ 'M')
        // --------------------------------------------------------
        const inputStart = document.getElementById('input-start');
        const inputEnd = document.getElementById('input-end');
        const suggestStart = document.getElementById('suggest-start');
        const suggestEnd = document.getElementById('suggest-end');

        function bindSuggest(inputElement, suggestElement, keySetter) {
            inputElement.addEventListener('input', () => {
                const val = inputElement.value.toLowerCase().trim();
                suggestElement.innerHTML = '';
                
                if (!val) { suggestElement.classList.add('hidden'); return; }

                const matches = Object.entries(stations).filter(([_, st]) => st.name.toLowerCase().includes(val));
                if (matches.length === 0) { suggestElement.classList.add('hidden'); return; }

                matches.forEach(([id, st]) => {
                    const color = linesInfo[st.line].color;
                    const item = document.createElement('div');
                    item.className = 'px-4 py-3 bg-[#0a0c16]/95 hover:bg-white/5 cursor-pointer flex justify-between items-center transition-colors border-b border-white/5';
                    
                    // Обновленный дизайн подсказки: Скругленный квадрат 'M' вместо текста линии
                    item.innerHTML = `
                        <span class="text-white font-medium text-[13px]">${st.name}</span>
                        <div class="flex items-center justify-center w-5 h-5 rounded-md text-white font-bold text-[11px] shrink-0 shadow-sm" style="background-color: ${color}">M</div>
                    `;
                    
                    item.addEventListener('click', () => {
                        inputElement.value = st.name;
                        keySetter(id);
                        suggestElement.classList.add('hidden');
                        buildOptimalPath();
                    });
                    suggestElement.appendChild(item);
                });
                suggestElement.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!inputElement.contains(e.target) && !suggestElement.contains(e.target)) suggestElement.classList.add('hidden');
            });
        }

        bindSuggest(inputStart, suggestStart, (id) => { selectedStartId = id; });
        bindSuggest(inputEnd, suggestEnd, (id) => { selectedEndId = id; });

        function selectStation(id) {
            if (!selectedStartId) {
                selectedStartId = id;
                inputStart.value = stations[id].name;
                document.getElementById('status-message').innerText = 'Выберите конечную станцию';
                highlightMarker(id);
            } else if (!selectedEndId && id !== selectedStartId) {
                selectedEndId = id;
                inputEnd.value = stations[id].name;
                buildOptimalPath();
            } else {
                selectedStartId = id;
                selectedEndId = null;
                inputStart.value = stations[id].name;
                inputEnd.value = '';
                resetUItoSearch();
                document.getElementById('status-message').innerText = 'Выберите конечную станцию';
                highlightMarker(id);
            }
        }

        function highlightMarker(id) {
            Object.values(stationMarkers).forEach(m => {
                const el = m.getElement()?.firstChild;
                if (el) el.classList.remove('active', 'route-node');
            });
            const el = stationMarkers[id].getElement()?.firstChild;
            if (el) el.classList.add('active');
        }

        document.getElementById('btn-reverse').addEventListener('click', () => {
            const tempId = selectedStartId; selectedStartId = selectedEndId; selectedEndId = tempId;
            const tempVal = inputStart.value; inputStart.value = inputEnd.value; inputEnd.value = tempVal;
            buildOptimalPath();
        });

        // --------------------------------------------------------
        // 5. ДЕЙКСТРА И ОТРИСОВКА ПУТИ
        // --------------------------------------------------------
        function solveDijkstra(start, end) {
            const distances = {}; const previous = {}; const pq = [];
            Object.keys(graph).forEach(node => { distances[node] = Infinity; previous[node] = null; });
            distances[start] = 0; pq.push({ node: start, cost: 0 });

            while (pq.length > 0) {
                pq.sort((a, b) => a.cost - b.cost);
                const { node: u, cost: currentCost } = pq.shift();
                if (u === end) break;
                if (currentCost > distances[u]) continue;

                graph[u].forEach(neighbor => {
                    const v = neighbor.node; const weight = neighbor.weight; const nextCost = currentCost + weight;
                    if (nextCost < distances[v]) { distances[v] = nextCost; previous[v] = { from: u, type: neighbor.type }; pq.push({ node: v, cost: nextCost }); }
                });
            }

            if (distances[end] === Infinity) return null;
            const path = []; let curr = end;
            while (curr !== null) { path.unshift(curr); const prevStep = previous[curr]; curr = prevStep ? prevStep.from : null; }
            return { path, totalTime: distances[end] };
        }

        function getEdgeType(u, v) {
            const edge = graph[u].find(n => n.node === v); return edge ? edge.type : null;
        }

        // --------------------------------------------------------
        // 6. УПРАВЛЕНИЕ РЕЗУЛЬТАТАМИ И СЛАЙДЕРОМ
        // --------------------------------------------------------
        const dockInputs = document.getElementById('dock-inputs');
        const dockResult = document.getElementById('dock-result');
        const dockDetailsPanel = document.getElementById('dock-details-panel');
        const carouselWrapper = document.getElementById('carousel-wrapper');
        const dotsLineContainer = document.getElementById('dots-line-container');
        const statusMessage = document.getElementById('status-message');

        let slidesData = [];
        let currentSlideIndex = 0;
        let isDetailsOpen = false;

        function buildOptimalPath(updateHash = true) {
            if (!selectedStartId || !selectedEndId) return;
            if (selectedStartId === selectedEndId) { statusMessage.innerText = 'Начало и конец совпадают'; return; }

            const result = solveDijkstra(selectedStartId, selectedEndId);
            if (!result) { statusMessage.innerText = 'Маршрут не найден'; return; }

            drawRouteOnMap(result.path);
            buildCarouselAndDots(result.path, result.totalTime);

            dockInputs.classList.add('hidden');
            dockResult.classList.remove('hidden');

            document.getElementById('res-time').innerText = `~${result.totalTime} мин`;
            document.getElementById('res-start-name').innerText = stations[selectedStartId].name;
            document.getElementById('res-end-name').innerText = stations[selectedEndId].name;
            statusMessage.innerText = 'Маршрут построен';

            if (updateHash) window.location.hash = `route=${selectedStartId}~${selectedEndId}`;
        }

        function drawRouteOnMap(path) {
            routeLayerGroup.clearLayers();
            
            Object.values(stationMarkers).forEach(m => {
                const el = m.getElement()?.firstChild;
                if (el) el.classList.remove('active', 'route-node');
            });

            const points = [];
            for (let i = 0; i < path.length - 1; i++) {
                const u = path[i]; const v = path[i+1]; const type = getEdgeType(u, v);
                const uCoords = stations[u].coords; const vCoords = stations[v].coords;
                points.push(uCoords); if (i === path.length - 2) points.push(vCoords);

                if (type === 'line') {
                    const color = linesInfo[stations[u].line].color;
                    L.polyline([uCoords, vCoords], { color: color, weight: 4.5, opacity: 0.9, lineCap: 'round' }).addTo(routeLayerGroup);
                    L.polyline([uCoords, vCoords], { color: '#ffffff', weight: 1.5, opacity: 1, lineCap: 'round' }).addTo(routeLayerGroup);
                } else if (type === 'transfer') {
                    L.polyline([uCoords, vCoords], { color: '#ffffff', weight: 2.5, opacity: 0.9, dashArray: '3, 4' }).addTo(routeLayerGroup);
                }
            }

            const startMarkerEl = stationMarkers[path[0]].getElement()?.firstChild;
            if (startMarkerEl) startMarkerEl.classList.add('route-node');

            const endMarkerEl = stationMarkers[path[path.length - 1]].getElement()?.firstChild;
            if (endMarkerEl) endMarkerEl.classList.add('route-node');

            map.flyToBounds(L.latLngBounds(points), { padding: [80, 80], animate: true, duration: 1.5 });
        }

        function buildCarouselAndDots(path, totalTime) {
            carouselWrapper.innerHTML = '';
            const dotsToRemove = dotsLineContainer.querySelectorAll('.step-dot');
            dotsToRemove.forEach(dot => dot.remove());

            slidesData = [];
            let currentLine = stations[path[0]].line;
            let currentLineColor = linesInfo[currentLine].color;

            slidesData.push({ badge: 'Старт', station: stations[path[0]].name, subtext: `Посадка на ${linesInfo[currentLine].name}`, color: currentLineColor, icon: 'subway', coords: stations[path[0]].coords });

            let stationsCount = 0;
            for (let i = 0; i < path.length - 1; i++) {
                const u = path[i]; const v = path[i+1]; const type = getEdgeType(u, v);
                if (type === 'line') {
                    stationsCount++;
                } else if (type === 'transfer') {
                    const stU = stations[u]; const stV = stations[v];
                    const nextLine = stV.line; const nextLineColor = linesInfo[nextLine].color;

                    if (stationsCount > 0) {
                        slidesData.push({ badge: 'Проезд', station: `До ст. ${stU.name}`, subtext: `${stationsCount} ст. в пути`, color: currentLineColor, icon: 'arrow-right-circle', coords: stU.coords });
                        stationsCount = 0;
                    }
                    slidesData.push({ badge: 'Переход', station: stV.name, subtext: `Переход на ${linesInfo[nextLine].name}`, color: nextLineColor, icon: 'git-compare', coords: stV.coords });
                    currentLine = nextLine; currentLineColor = nextLineColor;
                }
            }
            if (stationsCount > 0) {
                const lastNode = stations[path[path.length - 1]];
                slidesData.push({ badge: 'Проезд', station: `До ст. ${lastNode.name}`, subtext: `${stationsCount} ст. в пути`, color: currentLineColor, icon: 'arrow-right-circle', coords: lastNode.coords });
            }
            slidesData.push({ badge: 'Финиш', station: stations[path[path.length - 1]].name, subtext: 'Вы у цели!', color: '#ef4444', icon: 'check-circle', coords: stations[path[path.length - 1]].coords });

            slidesData.forEach((slide, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'carousel-item flex-shrink-0 w-44 bg-white/5 border border-white/5 rounded-2xl p-3.5 snap-center flex flex-col justify-between cursor-pointer';
                slideDiv.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[8px] uppercase tracking-wider font-bold px-2 py-0.5 rounded" style="background-color: ${slide.color}20; color: ${slide.color}">${slide.badge}</span>
                            <div class="p-1 rounded bg-white/5"><i data-lucide="${slide.icon}" class="w-3.5 h-3.5" style="color: ${slide.color}"></i></div>
                        </div>
                        <h4 class="text-[11px] font-bold text-white leading-tight mb-1 truncate" title="${slide.station}">${slide.station}</h4>
                    </div>
                    <p class="text-[10px] text-gray-400 font-medium truncate mt-1">${slide.subtext}</p>
                `;
                slideDiv.addEventListener('click', () => { scrollToSlide(idx); });
                carouselWrapper.appendChild(slideDiv);

                const dot = document.createElement('div');
                dot.className = 'step-dot cursor-pointer';
                dot.addEventListener('click', () => { scrollToSlide(idx); });
                dotsLineContainer.appendChild(dot);
            });
            lucide.createIcons();
            currentSlideIndex = 0; updateSlidesFocusAndMap(); recalculateDotsConnector();
        }

        document.getElementById('btn-toggle-details').addEventListener('click', () => {
            isDetailsOpen = !isDetailsOpen;
            if (isDetailsOpen) {
                dockDetailsPanel.classList.remove('hidden'); dockDetailsPanel.classList.add('flex');
                document.getElementById('details-chevron').style.transform = 'rotate(180deg)';
                setTimeout(() => { recalculateDotsConnector(); scrollToSlide(0); }, 50);
            } else {
                dockDetailsPanel.classList.add('hidden'); dockDetailsPanel.classList.remove('flex');
                document.getElementById('details-chevron').style.transform = 'rotate(0deg)';
            }
        });

        function updateSlidesFocusAndMap() {
            const items = carouselWrapper.querySelectorAll('.carousel-item');
            items.forEach((item, idx) => { if (idx === currentSlideIndex) item.classList.add('active'); else item.classList.remove('active'); });

            const dots = dotsLineContainer.querySelectorAll('.step-dot');
            dots.forEach((dot, idx) => {
                if (idx === currentSlideIndex) { dot.classList.add('active'); dot.style.backgroundColor = slidesData[idx].color; dot.style.boxShadow = `0 0 8px ${slidesData[idx].color}`; } 
                else { dot.classList.remove('active'); dot.style.backgroundColor = '#272d3d'; dot.style.boxShadow = 'none'; }
            });

            recalculateDotsConnector();

            const activeSlide = slidesData[currentSlideIndex];
            if (activeSlide && activeSlide.coords && isDetailsOpen) {
                map.flyTo(activeSlide.coords, 14, { animate: true, duration: 0.8 });
            }
        }

        function recalculateDotsConnector() {
            const dots = Array.from(dotsLineContainer.querySelectorAll('.step-dot'));
            if (dots.length < 2) return;
            const baseConn = document.getElementById('dot-base-connector'); const activeConn = document.getElementById('dot-active-connector');
            const cRect = dotsLineContainer.getBoundingClientRect();
            const fRect = dots[0].getBoundingClientRect(); const lRect = dots[dots.length - 1].getBoundingClientRect();
            
            baseConn.style.left = `${fRect.left - cRect.left + (fRect.width / 2)}px`;
            baseConn.style.width = `${(lRect.left + (lRect.width / 2)) - (fRect.left + (fRect.width / 2))}px`;

            if (currentSlideIndex < dots.length - 1) {
                const curRect = dots[currentSlideIndex].getBoundingClientRect(); const nextRect = dots[currentSlideIndex + 1].getBoundingClientRect();
                activeConn.style.left = `${curRect.left - cRect.left + (curRect.width / 2)}px`;
                activeConn.style.width = `${(nextRect.left + (nextRect.width / 2)) - (curRect.left + (curRect.width / 2))}px`;
                activeConn.style.backgroundColor = slidesData[currentSlideIndex].color; activeConn.style.display = 'block';
            } else { activeConn.style.display = 'none'; }
        }

        function scrollToSlide(index) {
            if (index < 0 || index >= slidesData.length) return;
            currentSlideIndex = index;
            const items = carouselWrapper.querySelectorAll('.carousel-item');
            if (items[index]) {
                const w = carouselWrapper.clientWidth; const iw = items[index].clientWidth; const il = items[index].offsetLeft;
                carouselWrapper.scrollTo({ left: il - (w / 2) + (iw / 2), behavior: 'smooth' });
            }
            updateSlidesFocusAndMap();
        }

        document.getElementById('btn-prev-slide').addEventListener('click', () => { if (currentSlideIndex > 0) scrollToSlide(currentSlideIndex - 1); });
        document.getElementById('btn-next-slide').addEventListener('click', () => { if (currentSlideIndex < slidesData.length - 1) scrollToSlide(currentSlideIndex + 1); });

        let scrollTimeout;
        carouselWrapper.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const items = carouselWrapper.querySelectorAll('.carousel-item');
                const center = carouselWrapper.scrollLeft + (carouselWrapper.clientWidth / 2);
                let min = Infinity; let act = 0;
                items.forEach((item, idx) => { const ic = item.offsetLeft + (item.clientWidth / 2); const dist = Math.abs(center - ic); if (dist < min) { min = dist; act = idx; } });
                if (act !== currentSlideIndex) { currentSlideIndex = act; updateSlidesFocusAndMap(); }
            }, 80);
        });

        // --------------------------------------------------------
        // 7. СБРОС И ШЕРИНГ (MRID)
        // --------------------------------------------------------
        function resetUItoSearch() {
            routeLayerGroup.clearLayers();
            Object.values(stationMarkers).forEach(m => m.getElement()?.firstChild?.classList.remove('active', 'route-node'));
            dockInputs.classList.remove('hidden');
            dockResult.classList.add('hidden');
            dockDetailsPanel.classList.add('hidden');
            isDetailsOpen = false;
            document.getElementById('details-chevron').style.transform = 'rotate(0deg)';
        }

        document.getElementById('btn-close-route').addEventListener('click', () => {
            selectedStartId = null; selectedEndId = null;
            inputStart.value = ''; inputEnd.value = '';
            resetUItoSearch();
            statusMessage.innerText = 'Нажмите на две станции на карте для построения маршрута';
            history.pushState("", document.title, window.location.pathname + window.location.search);
            map.flyTo([59.9325, 30.3340], 11.5, { animate: true, duration: 1.5 });
        });

        document.getElementById('btn-share').addEventListener('click', () => {
            if (!selectedStartId || !selectedEndId) return;
            const mridUrl = `${window.location.origin}${window.location.pathname}#route=${selectedStartId}~${selectedEndId}`;
            const tempArea = document.createElement("textarea"); tempArea.value = mridUrl; tempArea.style.cssText = "position:fixed;top:0;left:0;";
            document.body.appendChild(tempArea); tempArea.focus(); tempArea.select();
            try { if (document.execCommand('copy')) showToast('Ссылка скопирована!'); } catch (err) { console.error(err); }
            document.body.removeChild(tempArea);
        });

        const toast = document.getElementById('toast');
        function showToast(text) {
            document.getElementById('toast-text').innerText = text;
            toast.classList.remove('hidden', 'opacity-0'); toast.classList.add('flex');
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => { toast.classList.add('hidden'); toast.classList.remove('flex'); }, 300); }, 2500);
        }

        function loadMRID() {
            const match = window.location.hash.match(/^#route=([a-zA-Z0-9_]+)~([a-zA-Z0-9_]+)$/);
            if (match && stations[match[1]] && stations[match[2]]) {
                selectedStartId = match[1]; selectedEndId = match[2];
                inputStart.value = stations[match[1]].name; inputEnd.value = stations[match[2]].name;
                buildOptimalPath(false);
            }
        }
        window.addEventListener('load', loadMRID);
        window.addEventListener('hashchange', loadMR
                                
        window.addEventListener('resize', recalculateDotsConnector);
    </script>
</body>
